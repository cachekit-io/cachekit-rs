name: Release

on:
  push:
    branches:
      - main
  # Break-glass republish: dispatch when a release got tagged but the crates.io
  # publish never ran (the v0.4.0 run died before the publish job — LAB-742).
  # The required tag input pins WHAT gets published: main can drift past an
  # unpublished tag within hours (it did for v0.4.0), and publishing main HEAD
  # would package that drift under the tagged version. cargo publish fails
  # loudly on already-uploaded versions, so a redundant dispatch cannot
  # double-publish.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to republish (e.g. cachekit-rs-v0.4.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

# Serialise release runs so a manual dispatch can't race a push-triggered
# publish into two concurrent cargo publish attempts. Never cancel an
# in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['crates/cachekit--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates/cachekit--tag_name'] }}
      macros_release_created: ${{ steps.release.outputs['crates/cachekit-macros--release_created'] }}
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Debug release-please outputs
        # env indirection, never inline ${{ }} in run: the outputs embed
        # changelog prose, and one apostrophe in it terminates a single-quoted
        # shell string — that exit 127 killed the job before `publish` on
        # every push since 2026-07-22, orphaning the v0.4.0 release.
        env:
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
        run: echo "$RELEASE_OUTPUTS"

      - name: Assign release PR to 27Bslash6
        # REST instead of `gh pr edit --add-assignee`: gh's assignee edit goes
        # through GraphQL mutations that 403 with app installation tokens
        # (cli/cli#6274, replaceActorsForAssignable). The assignees REST
        # endpoint works with the PR-write permission the app token has.
        if: ${{ steps.release.outputs.pr }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ fromJson(steps.release.outputs.pr).number }}/assignees" \
            -f "assignees[]=27Bslash6"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  publish:
    needs: release-please
    # Run on an automated release, OR on a manual dispatch. The dispatch must
    # target main (workflow_dispatch can fire from any ref; requiring main
    # stops a feature branch from driving a publish) — the required tag input
    # alone decides what content ships.
    if: ${{ needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
    runs-on: cachekit-lean
    timeout-minutes: 30
    env:
      RUSTUP_HOME: /tmp/rustup
      CARGO_HOME: /tmp/cargo
      # Same 6Gi cgroup OOM constraint as CI (issue #25): cap parallel jobs so
      # the cold pre-publish build doesn't OOM-kill the linker on cachekit-lean.
      CARGO_BUILD_JOBS: "4"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # On dispatch, build and publish the tag's content — never main HEAD.
          # inputs.tag is empty on push events, so github.sha keeps the default
          # checkout behaviour there.
          ref: ${{ inputs.tag || github.sha }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run tests before publish
        run: cargo test --features "cachekitio,redis,encryption,l1,macros"

      - name: Verify MSRV (1.85) before publish
        # Gate: never ship a release that breaks the declared MSRV floor.
        # release.yml previously built `stable` only, so a red MSRV job could
        # publish silently (issue #25). `check --all-targets` catches any use
        # of a newer-than-1.85 API across lib + tests without a heavy build.
        run: |
          rustup toolchain install 1.85 --profile minimal
          cargo +1.85 check --all-targets --features "cachekitio,redis,encryption,l1,macros"

      - name: Publish cachekit-macros to crates.io
        # Known gap: after a PARTIAL failure (macros uploaded, cachekit-rs not),
        # a redundant dispatch still dies here on the macros duplicate — publish
        # the missing crate manually in that case.
        run: cargo publish -p cachekit-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish cachekit-rs to crates.io
        run: cargo publish -p cachekit-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
